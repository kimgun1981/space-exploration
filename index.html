<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0b1026">
<title>우주 탐험 — 아이들과 함께 보는 태양계</title>
<meta name="description" content="행성을 누르면 한국어로 알려주는 아이들을 위한 3D 태양계 탐험 앱">
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%AA%90%3C/text%3E%3C/svg%3E">
<meta property="og:type" content="website">
<meta property="og:title" content="🪐 우주 탐험">
<meta property="og:description" content="아이들과 함께 보는 태양계 — 행성을 누르면 한국어로 알려줘요">
<meta property="og:image" content="https://kimgun1981.github.io/space-exploration/og-image.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:url" content="https://kimgun1981.github.io/space-exploration/">
<meta name="twitter:card" content="summary_large_image">
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Gowun+Dodum&display=swap" rel="stylesheet">
<style>
  :root{
    --space:#0b1026;
    --ink:#eaf2ff;
    --sun:#ffd166;
    --sky:#7fd8f5;
    --bubble:rgba(16,24,54,.88);
    --chip:rgba(127,216,245,.14);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  [hidden]{display:none!important}  /* display 지정 요소(.quizWrap, .more)가 hidden을 덮지 않도록 */
  html,body{height:100vh;height:100dvh;overflow:hidden;background:var(--space);font-family:'Gowun Dodum',sans-serif;color:var(--ink);
    user-select:none;-webkit-user-select:none;touch-action:none;overscroll-behavior:none}
  #c{position:fixed;top:0;left:0;width:100vw;height:100vh;height:100dvh;display:block}

  /* ── 상단 바 ───────────────────────── */
  header{position:fixed;top:0;left:0;right:0;z-index:10;display:flex;align-items:center;gap:10px;
    padding:calc(10px + env(safe-area-inset-top)) 14px 10px;pointer-events:none}
  h1{font-family:'Jua',sans-serif;font-size:clamp(19px,4.6vw,26px);font-weight:400;letter-spacing:.5px;
    text-shadow:0 2px 14px rgba(127,216,245,.45);pointer-events:auto}
  h1 span{color:var(--sun)}
  .spacer{flex:1}
  .mode,.snd{pointer-events:auto;border:1px solid rgba(234,242,255,.22);background:var(--bubble);color:var(--ink);
    font-family:'Jua',sans-serif;font-size:14px;border-radius:999px;padding:8px 14px;cursor:pointer;
    transition:transform .15s, background .2s}
  .mode:active,.snd:active{transform:scale(.94)}
  .snd{width:40px;height:40px;padding:0;display:grid;place-items:center;font-size:17px}
  .snd.off{opacity:.45}

  /* ── 안내말 ───────────────────────── */
  #hint{position:fixed;top:calc(64px + env(safe-area-inset-top));left:50%;transform:translateX(-50%);
    z-index:9;font-family:'Jua',sans-serif;font-size:15px;color:var(--sky);
    background:var(--bubble);padding:8px 18px;border-radius:999px;border:1px solid rgba(127,216,245,.3);
    animation:float 2.6s ease-in-out infinite;transition:opacity .4s;white-space:nowrap}
  @keyframes float{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-6px)}}
  #hint.hide{opacity:0;pointer-events:none}

  /* ── 정보 말풍선 ───────────────────── */
  #card{position:fixed;left:50%;transform:translateX(-50%) translateY(20px);bottom:calc(86px + env(safe-area-inset-bottom));
    z-index:10;width:min(560px,calc(100% - 24px));max-height:calc(100dvh - 180px);overflow-y:auto;-webkit-overflow-scrolling:touch;
    background:var(--bubble);border:1px solid rgba(127,216,245,.32);
    border-radius:22px;padding:16px 18px 14px;
    box-shadow:0 8px 40px rgba(0,0,0,.5);opacity:0;pointer-events:none;transition:opacity .35s, transform .35s}
  #card.show{opacity:1;pointer-events:auto;transform:translateX(-50%) translateY(0)}
  #card .name{font-family:'Jua',sans-serif;font-size:22px;color:var(--sun);display:flex;align-items:center;gap:8px}
  #card .name em{font-style:normal;font-size:13px;color:var(--sky);background:var(--chip);
    border-radius:999px;padding:3px 10px}
  #card .fact{margin-top:8px;font-size:16px;line-height:1.65}
  #card .row{margin-top:12px;display:flex;gap:8px}
  #card button{flex:1;font-family:'Jua',sans-serif;font-size:15px;border:none;border-radius:14px;padding:11px 0;
    cursor:pointer;transition:transform .15s}
  #card button:active{transform:scale(.96)}
  #speakBtn{background:linear-gradient(135deg,#ffd166,#ff9e54);color:#2a1b00}
  #speakBtn.speaking{animation:pulse 1s ease-in-out infinite}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,209,102,.55)}50%{box-shadow:0 0 0 9px rgba(255,209,102,0)}}
  #closeBtn{background:rgba(234,242,255,.1);color:var(--ink);flex:0 0 64px}

  /* ── 더 알아보기 (확장 카드) ───────────────── */
  #card #moreBtn{flex:none;width:100%;margin-top:12px;background:rgba(127,216,245,.14);color:var(--sky);
    border:1px solid rgba(127,216,245,.32);font-size:14px;padding:11px 0;border-radius:14px}
  .more{margin-top:14px;padding-top:14px;border-top:1px dashed rgba(127,216,245,.22);
    display:flex;flex-direction:column;gap:16px}
  .moreText{font-size:15px;line-height:1.65;color:var(--ink)}
  .moreSection h3{font-family:'Jua',sans-serif;font-size:15px;color:var(--sky);margin-bottom:8px;font-weight:400}
  .moreSection ul{list-style:none;padding:0;display:flex;flex-direction:column;gap:7px}
  .moreSection li{font-size:14px;line-height:1.55;padding-left:22px;position:relative}
  .moreSection li::before{content:'✦';position:absolute;left:4px;color:var(--sun);font-size:12px}
  .moreSection dl{display:grid;grid-template-columns:max-content 1fr;gap:7px 14px;margin:0;font-size:14px}
  .moreSection dt{color:var(--sky);font-family:'Jua',sans-serif;font-weight:400}
  .moreSection dd{margin:0;color:var(--ink)}
  .cutaway{display:flex;gap:14px;align-items:center;background:rgba(127,216,245,.06);
    border-radius:14px;padding:14px;border:1px solid rgba(127,216,245,.12)}
  .cutaway svg{flex:0 0 120px;width:120px;height:120px}
  .cutaway .legend{flex:1;display:flex;flex-direction:column;gap:7px;font-size:13px}
  .cutaway .legend > div{display:flex;align-items:center;gap:8px}
  .cutaway .legend i{display:inline-block;width:13px;height:13px;border-radius:50%;
    border:1px solid rgba(255,255,255,.25);flex:0 0 13px}
  .cutaway .legendTitle{font-family:'Jua',sans-serif;color:var(--sky);font-size:13px;margin-bottom:2px}

  /* ── 하단 행성 칩 ──────────────────── */
  nav{position:fixed;left:0;right:0;bottom:0;z-index:10;display:flex;gap:8px;overflow-x:auto;
    padding:10px 12px calc(12px + env(safe-area-inset-bottom));scrollbar-width:none;
    mask-image:linear-gradient(90deg,transparent,#000 16px,#000 calc(100% - 16px),transparent)}
  nav::-webkit-scrollbar{display:none}
  .pill{flex:0 0 auto;font-family:'Jua',sans-serif;font-size:14px;color:var(--ink);background:rgba(20,28,60,.66);
    border:1px solid rgba(127,216,245,.25);border-radius:999px;padding:9px 15px;cursor:pointer;
    display:flex;align-items:center;gap:6px;transition:transform .15s, background .2s}
  .pill:active{transform:scale(.93)}
  .pill.on{background:rgba(255,209,102,.22);border-color:var(--sun);color:var(--sun)}
  .dot{width:11px;height:11px;border-radius:50%;flex:0 0 auto;box-shadow:0 0 6px currentColor}

  @media (max-width: 400px){
    header{gap:6px;padding:calc(8px + env(safe-area-inset-top)) 10px 8px}
    h1{font-size:18px}
    .mode{font-size:12px;padding:7px 11px}
    .snd{width:36px;height:36px;font-size:15px}
    #hint{font-size:13px;padding:7px 14px;top:calc(56px + env(safe-area-inset-top))}
    #card{bottom:calc(78px + env(safe-area-inset-bottom));padding:14px 14px 12px}
    #card .name{font-size:19px}
    #card .fact{font-size:15px}
  }
  /* 아이패드+ 가로 모드: 카드를 오른쪽 사이드바로 (행성과 동시에 보이도록) */
  @media (min-width: 900px) and (orientation: landscape){
    #card{
      left:auto; right:14px; bottom:auto;
      top:calc(78px + env(safe-area-inset-top));
      transform:translateY(20px);
      width:380px;
      max-height:calc(100dvh - 110px - env(safe-area-inset-top));
    }
    #card.show{transform:translateY(0)}
  }
  @media (prefers-reduced-motion: reduce){
    #hint{animation:none}
    #speakBtn.speaking{animation:none}
  }

  /* ── 천체 이름 라벨 (3D 위에 떠 있는 클릭 가능한 이름표) ── */
  #labels{position:fixed;inset:0;z-index:8;pointer-events:none;transition:opacity .2s}
  #labels.moving{opacity:0}  /* 화면을 움직이는 동안엔 숨겨 떨림(어긋남) 방지 */
  #labels.moving .lbl{pointer-events:none}
  .lbl{position:absolute;left:0;top:0;will-change:transform;font-family:'Jua',sans-serif;font-size:12px;
    color:var(--ink);background:rgba(11,16,38,.74);border:1px solid rgba(127,216,245,.25);
    border-radius:999px;padding:2px 9px;white-space:nowrap;pointer-events:auto;cursor:pointer;
    opacity:.85;transition:opacity .25s;text-shadow:0 1px 4px rgba(0,0,0,.6)}
  .lbl.dim{opacity:0;pointer-events:none}

  /* ── 플로팅 버튼 (처음 위치) ── */
  .fab{position:fixed;left:12px;z-index:10;width:44px;height:44px;border-radius:50%;
    border:1px solid rgba(234,242,255,.22);background:var(--bubble);color:var(--ink);
    font-size:19px;cursor:pointer;display:grid;place-items:center;
    transition:transform .15s, opacity .25s}
  .fab:active{transform:scale(.9)}
  #homeFab{bottom:calc(64px + env(safe-area-inset-bottom))}

  /* ── 퀴즈 ── */
  .quizWrap{position:fixed;inset:0;z-index:20;display:grid;place-items:center;
    background:rgba(4,8,22,.84);padding:18px}
  .quizBox{width:min(440px,100%);background:var(--bubble);border:1px solid rgba(127,216,245,.35);
    border-radius:24px;padding:20px;box-shadow:0 12px 50px rgba(0,0,0,.6)}
  .quizTop{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
  #quizScore{font-family:'Jua',sans-serif;color:var(--sun);font-size:17px}
  #quizClose{background:rgba(234,242,255,.1);border:none;color:var(--ink);width:34px;height:34px;
    border-radius:50%;font-size:15px;cursor:pointer}
  .quizQ{font-family:'Jua',sans-serif;font-size:19px;line-height:1.5;margin-bottom:16px}
  .quizOpts{display:flex;flex-direction:column;gap:10px}
  .quizOpts button{font-family:'Gowun Dodum',sans-serif;font-size:16px;text-align:left;
    background:var(--chip);border:1px solid rgba(127,216,245,.25);color:var(--ink);
    border-radius:14px;padding:13px 16px;cursor:pointer;transition:transform .12s, background .2s}
  .quizOpts button:active{transform:scale(.97)}
  .quizOpts button.correct{background:rgba(120,230,150,.25);border-color:#7be39a;color:#eafff0}
  .quizOpts button.wrong{background:rgba(255,120,120,.22);border-color:#ff8a8a}
  .quizOpts button:disabled{cursor:default}
  .quizFb{margin-top:14px;font-size:15px;line-height:1.55;color:var(--sky)}
  .quizNext{width:100%;margin-top:16px;font-family:'Jua',sans-serif;font-size:16px;border:none;
    border-radius:14px;padding:13px 0;background:linear-gradient(135deg,#ffd166,#ff9e54);color:#2a1b00;cursor:pointer}
</style>
</head>
<body>
<canvas id="c"></canvas>

<header>
  <h1>🪐 우주 <span>탐험</span></h1>
  <div class="spacer"></div>
  <button class="mode" id="modeBtn">✨ 이웃 별</button>
  <button class="snd" id="quizBtn" title="퀴즈">🎯</button>
  <button class="snd" id="sndBtn" title="소리 켜기/끄기">🔊</button>
</header>

<div id="hint">행성을 톡 눌러 보세요!</div>
<div id="labels"></div>
<button class="fab" id="homeFab" title="처음 위치로">🏠</button>

<div id="card">
  <div class="name"><span id="cName"></span><em id="cTag"></em></div>
  <div class="fact" id="cFact"></div>
  <button id="moreBtn" class="moreToggle">📖 더 알아보기 ↓</button>
  <div class="more" id="cMore" hidden>
    <div class="moreText" id="cMoreText"></div>
    <div class="cutaway" id="cCutaway"></div>
    <section class="moreSection">
      <h3>✨ 알아두면 좋은 사실</h3>
      <ul id="cFunFacts"></ul>
    </section>
    <section class="moreSection">
      <h3>📊 한눈에 보는 정보</h3>
      <dl id="cStats"></dl>
    </section>
  </div>
  <div class="row">
    <button id="speakBtn">🔊 다시 들려줘!</button>
    <button id="closeBtn">닫기</button>
  </div>
</div>

<nav id="nav"></nav>

<div id="quiz" class="quizWrap" hidden>
  <div class="quizBox">
    <div class="quizTop"><span id="quizScore">⭐ 0</span><button id="quizClose" title="닫기">✕</button></div>
    <div class="quizQ" id="quizQ"></div>
    <div class="quizOpts" id="quizOpts"></div>
    <div class="quizFb" id="quizFb"></div>
    <button class="quizNext" id="quizNext" hidden>다음 문제 →</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* ════════════════════════════════════════════
   우주 탐험 — 아이들을 위한 태양계 & 이웃 별
   탭하면 설명이 뜨고, 한국어 음성으로 읽어줘요.
   ════════════════════════════════════════════ */

// ── 데이터 ──────────────────────────────────
const PLANETS = [
  {id:'sun', name:'태양', tag:'우리의 별', emoji:'☀️', color:0xffd166, size:5.0, dist:0, speed:0,
   fact:'뜨겁게 타오르는 커다란 불덩어리 별이에요! 태양계 식구들을 모두 따뜻하게 비춰 주지요. 태양이 없으면 지구는 꽁꽁 얼어 버려요.',
   details:'태양은 우리 태양계의 중심에 있는 별이에요. 거대한 가스 공이 뜨겁게 타오르며 빛과 열을 내뿜고 있답니다. 태양 빛이 지구까지 오는 데에는 약 8분이 걸려요. 지구가 130만 개나 들어갈 만큼 크고, 무게는 태양계 전체의 99.8%나 차지해요.',
   funFacts:['표면 온도는 약 5,500도, 중심부는 무려 1,500만 도예요','수소가 헬륨으로 바뀌면서 빛과 열이 만들어져요','46억 살이고, 앞으로도 50억 년 더 빛날 수 있어요'],
   stats:{'지름':'139만 km','종류':'노란 왜성 (G형)','표면 온도':'약 5,500°C','나이':'약 46억 살'},
   cutaway:[{label:'핵', color:'#ffee99', r:0.25},{label:'복사층', color:'#ffd166', r:0.55},{label:'대류층', color:'#ffa552', r:0.85},{label:'광구', color:'#ff7c2e', r:1.0}]},
  {id:'mercury', name:'수성', tag:'가장 작은 행성', emoji:'🪨', color:0xb8a890, size:0.55, dist:9, speed:1.6,
   fact:'태양과 가장 가까운 꼬마 행성이에요. 낮에는 엄청 뜨겁고, 밤에는 엄청 추워요. 일 년이 겨우 88일이래요!',
   details:'수성은 태양에 가장 가까이 있고 태양계에서 가장 작은 행성이에요. 달처럼 표면이 운석 구덩이로 가득해요. 대기가 거의 없어서 낮에는 +430도까지 뜨거워지고, 밤에는 영하 180도까지 차가워져요. 가장 빠르게 태양을 도는 행성이지요.',
   funFacts:['하루(자전)는 지구 시간으로 약 59일이에요','일 년(공전)은 88일밖에 안 돼요','지구의 달과 크기가 거의 비슷해요','중력이 약해서 대기를 붙잡지 못해요'],
   stats:{'지름':'4,879 km','태양까지':'5,800만 km','하루':'59일','일 년':'88일','위성':'없음'},
   cutaway:[{label:'철 핵', color:'#cd853f', r:0.75},{label:'맨틀', color:'#a87752', r:0.95},{label:'지각', color:'#7a5d3e', r:1.0}]},
  {id:'venus', name:'금성', tag:'샛별', emoji:'🌕', color:0xf0c987, size:0.95, dist:12.5, speed:1.17,
   fact:'태양계에서 가장 뜨거운 행성이에요. 두꺼운 구름 이불을 덮고 있거든요. 새벽 하늘에서 반짝이는 샛별이 바로 금성이에요!',
   details:'금성은 지구와 크기가 비슷해서 지구의 쌍둥이라고 불려요. 두꺼운 구름이 열을 가둬서 표면 온도가 약 470도나 돼요. 태양계에서 가장 뜨거운 행성이에요. 신기하게도 다른 행성들과 반대 방향으로 천천히 자전한답니다.',
   funFacts:['하루가 일 년보다 길어요! 자전 243일, 공전 225일','표면 압력은 지구의 92배예요','구름이 황산으로 이뤄져 빛을 반사해 매우 밝아요','새벽과 저녁 하늘에서 가장 밝게 빛나요'],
   stats:{'지름':'12,104 km','태양까지':'1억 800만 km','하루':'243일','일 년':'225일','위성':'없음'},
   cutaway:[{label:'철 핵', color:'#ffb84d', r:0.5},{label:'맨틀', color:'#d49355', r:0.85},{label:'지각', color:'#a87752', r:0.93},{label:'구름', color:'#f0d68f', r:1.0}]},
  {id:'earth', name:'지구', tag:'우리 집', emoji:'🌍', color:0x4f9df7, size:1.0, dist:16, speed:1.0,
   fact:'우리가 사는 곳이에요! 시원한 물과 맑은 공기가 있어서 사람도, 동물도, 식물도 함께 살 수 있어요. 우주에서 보면 파란 구슬 같아요.',

// ── 기본 셋업 ────────────────────────────────
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0b1026);
const camera = new THREE.PerspectiveCamera(55, 1, 0.1, 4000);

scene.add(new THREE.AmbientLight(0x8899bb, 0.55));
const sunLight = new THREE.PointLight(0xfff2cc, 1.6, 600);
scene.add(sunLight);

// 별가루 배경
(function makeStarfield(){
  const N = 2200, pos = new Float32Array(N*3), col = new Float32Array(N*3);
  const tint = [new THREE.Color(0xffffff), new THREE.Color(0xcfe4ff), new THREE.Color(0xffe9c9)];
  for(let i=0;i<N;i++){
    const r = 420 + Math.random()*900;
    const t = Math.random()*Math.PI*2, p = Math.acos(2*Math.random()-1);
    pos[i*3]   = r*Math.sin(p)*Math.cos(t);
    pos[i*3+1] = r*Math.cos(p);
    pos[i*3+2] = r*Math.sin(p)*Math.sin(t);
    const c = tint[(Math.random()*3)|0];
    col[i*3]=c.r; col[i*3+1]=c.g; col[i*3+2]=c.b;
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(pos,3));
  g.setAttribute('color', new THREE.BufferAttribute(col,3));
  scene.add(new THREE.Points(g, new THREE.PointsMaterial({size:1.7, vertexColors:true, sizeAttenuation:true, transparent:true, opacity:.9})));
})();

// 부드러운 빛 번짐 스프라이트 텍스처
function glowTexture(hex){
  const s = 128, cv = document.createElement('canvas'); cv.width=cv.height=s;
  const ctx = cv.getContext('2d');
  const c = '#'+hex.toString(16).padStart(6,'0');
  const g = ctx.createRadialGradient(s/2,s/2,0,s/2,s/2,s/2);
  g.addColorStop(0,'rgba(255,255,255,1)');
  g.addColorStop(0.25,c);
  g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=g; ctx.fillRect(0,0,s,s);
  return new THREE.CanvasTexture(cv);
}

// ── 태양계 그룹 ──────────────────────────────
const solarGroup = new THREE.Group();
scene.add(solarGroup);
const pickables = []; // 현재 모드에서 탭 가능한 메시

function makePlanetMesh(p){
  const mat = p.id==='sun'
    ? new THREE.MeshBasicMaterial({color:p.color})
    : new THREE.MeshStandardMaterial({color:p.color, roughness:.85, metalness:.05});
  const sphere = new THREE.Mesh(new THREE.SphereGeometry(p.size, 40, 40), mat);
  sphere.userData = p;
  if(p.id==='sun'){
    const glow = new THREE.Sprite(new THREE.SpriteMaterial({map:glowTexture(0xffd166), transparent:true, opacity:.85, depthWrite:false}));
    glow.scale.setScalar(p.size*5.2); sphere.add(glow);
  }
  if(!p.ring) return {node:sphere, spin:sphere};
  // 고리 행성: 고리가 자전에 휩쓸려 흔들리지 않도록, 구만 자전시키고 고리는 고정한다.
  const group = new THREE.Group();
  group.userData = p;
  group.add(sphere);
  const ring = new THREE.Mesh(
    new THREE.RingGeometry(p.size*1.45, p.size*2.25, 64),
    new THREE.MeshBasicMaterial({color:0xd9c79a, side:THREE.DoubleSide, transparent:true, opacity:.65}));
  ring.rotation.x = Math.PI/2.25;
  group.add(ring);
  return {node:group, spin:sphere};
}

const bodies = {}; // id → {mesh, p, angle, spin}
PLANETS.forEach(p=>{
  const {node, spin} = makePlanetMesh(p);
  solarGroup.add(node);
  bodies[p.id] = {mesh:node, p, angle:Math.random()*Math.PI*2, spin};
  if(p.dist>0){
    const orbit = new THREE.Mesh(
      new THREE.RingGeometry(p.dist-0.035, p.dist+0.035, 128),
      new THREE.MeshBasicMaterial({color:0x7fd8f5, transparent:true, opacity:.16, side:THREE.DoubleSide}));
    orbit.rotation.x = Math.PI/2;
    solarGroup.add(orbit);
  }
});
// 위성들 — 각자 모행성(parent) 주위를 돈다
MOONS.forEach(m=>{
  const {node, spin} = makePlanetMesh(m);
  solarGroup.add(node);
  bodies[m.id] = {mesh:node, p:m, angle:Math.random()*Math.PI*2, spin};
});

// ── 소행성대 (화성 ↔ 목성 사이) ──────────────
let asteroidBelt;
(function makeBelt(){
  const N = 1100, pos = new Float32Array(N*3);
  for(let i=0;i<N;i++){
    const a = Math.random()*Math.PI*2;
    const r = 21.5 + Math.random()*4.5;
    pos[i*3]   = Math.cos(a)*r;
    pos[i*3+1] = (Math.random()-0.5)*0.9;
    pos[i*3+2] = Math.sin(a)*r;
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(pos,3));
  asteroidBelt = new THREE.Points(g, new THREE.PointsMaterial({color:0xa89a86, size:0.16, sizeAttenuation:true, transparent:true, opacity:.85}));
  solarGroup.add(asteroidBelt);
})();

// ── 이웃 별 그룹 ─────────────────────────────
const starGroup = new THREE.Group();
starGroup.visible = false;
scene.add(starGroup);
const starBodies = {};
STARS.forEach(s=>{
  const m = new THREE.Mesh(new THREE.SphereGeometry(s.size*0.5, 24, 24), new THREE.MeshBasicMaterial({color:s.color}));
  m.position.set(...s.pos);
  m.userData = s;
  const glow = new THREE.Sprite(new THREE.SpriteMaterial({map:glowTexture(s.color), transparent:true, opacity:.9, depthWrite:false}));
  glow.scale.setScalar(s.size*4.5);
  m.add(glow);
  starGroup.add(m);
  starBodies[s.id] = {mesh:m, p:s};
});

(function linkCentauri(){
  const a = STARS.find(s=>s.id==='alpha'), p = STARS.find(s=>s.id==='proxima');
  if(!a || !p) return;
  const g = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(...a.pos), new THREE.Vector3(...p.pos)]);
  starGroup.add(new THREE.Line(g, new THREE.LineBasicMaterial({color:0x7fd8f5, transparent:true, opacity:.22})));

// ── 별자리 그룹 ──────────────────────────────
const constGroup = new THREE.Group();
constGroup.visible = false;
scene.add(constGroup);
const constBodies = {};
CONSTS.forEach(c=>{
  const g = new THREE.Group();
  g.position.set(...c.pos);
  g.userData = c;
  const S = 2.4; // 별자리 모양 확대 배율
  const verts = c.stars.map(s=> new THREE.Vector3(s[0]*S, s[1]*S, 0));
  c.lines.forEach(([a,b])=>{
    const lg = new THREE.BufferGeometry().setFromPoints([verts[a], verts[b]]);
    g.add(new THREE.Line(lg, new THREE.LineBasicMaterial({color:c.color, transparent:true, opacity:.55})));
  });
  verts.forEach((v,idx)=>{
    const r = (c.bright===idx) ? 0.55 : 0.34;
    const sm = new THREE.Mesh(new THREE.SphereGeometry(r,16,16), new THREE.MeshBasicMaterial({color:0xffffff}));
    sm.position.copy(v);
    const glow = new THREE.Sprite(new THREE.SpriteMaterial({map:glowTexture(c.color), transparent:true, opacity:.85, depthWrite:false}));
    glow.scale.setScalar(r*6); sm.add(glow);
    g.add(sm);
  });
  // 탭하기 쉽도록 보이지 않는 큰 구를 둔다 (히트 영역)
  const pick = new THREE.Mesh(new THREE.SphereGeometry(9,8,8),
    new THREE.MeshBasicMaterial({transparent:true, opacity:0, depthWrite:false}));
  g.add(pick);
  constGroup.add(g);
  constBodies[c.id] = {mesh:g, p:c};
});

// ── 카메라 컨트롤 (직접 구현: 드래그 회전 + 핀치/휠 줌) ──
const ctrl = {
  target: new THREE.Vector3(0,0,0),
  theta: 0.9, phi: 1.15, radius: 70,
  minR: 4, maxR: 160,
  // 목표값(트윈)
  tTarget: new THREE.Vector3(0,0,0), tRadius: 70,
  followMesh: null,
};
function applyCamera(){
  ctrl.phi = Math.max(0.15, Math.min(Math.PI-0.15, ctrl.phi));
  ctrl.radius = Math.max(ctrl.minR, Math.min(ctrl.maxR, ctrl.radius));
  const r = ctrl.radius;
  camera.position.set(
    ctrl.target.x + r*Math.sin(ctrl.phi)*Math.cos(ctrl.theta),
    ctrl.target.y + r*Math.cos(ctrl.phi),
    ctrl.target.z + r*Math.sin(ctrl.phi)*Math.sin(ctrl.theta));
  camera.lookAt(ctrl.target);
}

const pointers = new Map();
let dragDist = 0, downPos = null, pinchStart = 0, radiusStart = 0;

canvas.addEventListener('pointerdown', e=>{
  pointers.set(e.pointerId, {x:e.clientX, y:e.clientY});
  if(pointers.size===1){ dragDist=0; downPos={x:e.clientX,y:e.clientY}; }
  if(pointers.size===2){
    const [a,b]=[...pointers.values()];
    pinchStart = Math.hypot(a.x-b.x, a.y-b.y);
    radiusStart = ctrl.radius;
  }
});
canvas.addEventListener('pointermove', e=>{
  if(!pointers.has(e.pointerId)) return;
  const prev = pointers.get(e.pointerId);
  const dx = e.clientX-prev.x, dy = e.clientY-prev.y;
  pointers.set(e.pointerId, {x:e.clientX, y:e.clientY});
  if(pointers.size===1){
    dragDist += Math.abs(dx)+Math.abs(dy);
    ctrl.theta += dx*0.005;
    ctrl.phi   -= dy*0.005;
    // 회전해도 선택한 천체는 계속 중심에 두고 둘러볼 수 있게 추적을 유지한다.
    // (자유 시점으로 돌아가려면 '닫기' 또는 '처음 위치' 버튼)
  } else if(pointers.size===2){
    const [a,b]=[...pointers.values()];
    const d = Math.hypot(a.x-b.x, a.y-b.y);
    if(pinchStart>0){ ctrl.radius = radiusStart * (pinchStart/d); ctrl.tRadius = ctrl.radius; }
  }
});
function pointerEnd(e){
  const wasTap = pointers.size===1 && dragDist < 12 && downPos;
  pointers.delete(e.pointerId);
  if(wasTap) handleTap(downPos.x, downPos.y);
  if(pointers.size<2) pinchStart=0;
}
canvas.addEventListener('pointerup', pointerEnd);
canvas.addEventListener('pointercancel', pointerEnd);
canvas.addEventListener('wheel', e=>{
  e.preventDefault();
  ctrl.radius *= (1 + Math.sign(e.deltaY)*0.08);
  ctrl.tRadius = ctrl.radius;
}, {passive:false});

// ── 탭 → 행성/별 선택 ────────────────────────
const ray = new THREE.Raycaster();
ray.params.Points = {threshold: 2};
const ndc = new THREE.Vector2();

function handleTap(x, y){
  ndc.x =  (x/innerWidth)*2 - 1;
  ndc.y = -(y/innerHeight)*2 + 1;
  ray.setFromCamera(ndc, camera);
  const hits = ray.intersectObjects(pickables, true);
  if(!hits.length) return;
  let obj = hits[0].object;
  while(obj && !obj.userData.id) obj = obj.parent;
  if(obj) select(obj.userData.id);
}

let mode = 'solar';
let selectedId = null;
const card = document.getElementById('card');
const hint = document.getElementById('hint');

// 모드별 자료 묶음 헬퍼 (solar / stars / const)
function poolFor(){ return mode==='solar' ? bodies : mode==='stars' ? starBodies : constBodies; }
function navListFor(){ return mode==='solar' ? PLANETS.concat(MOONS) : mode==='stars' ? STARS : CONSTS; }
function labelListFor(){ return mode==='solar' ? PLANETS : mode==='stars' ? STARS : CONSTS; }
function homeRadius(){ return mode==='solar' ? 70 : mode==='stars' ? 55 : 60; }

function select(id){
  const pool = poolFor();
  const b = pool[id];
  if(!b) return;
  selectedId = id;
  ctrl.followMesh = b.mesh;
  const wp = new THREE.Vector3(); b.mesh.getWorldPosition(wp);
  ctrl.tTarget.copy(wp);
  ctrl.tRadius = mode==='const' ? (b.p.frame || 18)
               : mode==='solar' ? Math.max(b.p.size*4.2, 5)
               : Math.max(b.p.size*6, 7);
  showCard(b.p);
  highlightPill(id);
  hint.classList.add('hide');
  updateCameraProjection();
}

function showCard(p){
  document.getElementById('cName').textContent = (p.emoji?p.emoji+' ':'⭐ ') + p.name;
  document.getElementById('cTag').textContent = p.tag;
  document.getElementById('cFact').textContent = p.fact;

  // 확장 카드 내용 채우기
  document.getElementById('cMoreText').textContent = p.details || '';
  document.getElementById('cFunFacts').innerHTML =
    (p.funFacts || []).map(f => `<li>${f}</li>`).join('');
  document.getElementById('cStats').innerHTML =
    Object.entries(p.stats || {}).map(([k,v]) => `<dt>${k}</dt><dd>${v}</dd>`).join('');
  const cutaway = document.getElementById('cCutaway');
  if(p.cutaway && p.cutaway.length){
    cutaway.style.display = '';
    cutaway.innerHTML = renderCutaway(p.cutaway);
  } else {
    cutaway.style.display = 'none';
    cutaway.innerHTML = '';
  }
  // 초기엔 접혀 있게
  document.getElementById('cMore').hidden = true;
  document.getElementById('moreBtn').textContent = '📖 더 알아보기 ↓';

  card.classList.add('show');
  card.scrollTop = 0;
  homeFab.style.display = 'none';
  speak(`${p.name}. ${p.fact}`);
}

function renderCutaway(layers){
  // layers: 안쪽부터 바깥쪽 순. 원은 큰 것부터 그려서 작은 것이 위에 오도록.
  const size = 100, cx = 50, cy = 50, maxR = 46;
  const circles = layers.slice().reverse().map(l =>
    `<circle cx="${cx}" cy="${cy}" r="${l.r*maxR}" fill="${l.color}" stroke="rgba(255,255,255,.18)" stroke-width="0.5"/>`
  ).join('');
  const legendItems = layers.slice().reverse().map(l =>
    `<div><i style="background:${l.color}"></i><span>${l.label}</span></div>`
  ).join('');
  return `<svg viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg">${circles}</svg>` +
         `<div class="legend"><div class="legendTitle">바깥 → 안쪽</div>${legendItems}</div>`;
}

// ── 한국어 음성 (TTS) ────────────────────────
let soundOn = true;
let koVoice = null;
function pickVoice(){
  const vs = speechSynthesis.getVoices();
  const koreans = vs.filter(v => v.lang === 'ko-KR' || (v.lang && v.lang.startsWith('ko')));
  if(!koreans.length){ koVoice = null; return; }
  // 자연스러운 보이스 우선: Enhanced > Premium > Neural > Natural > 그 외
  // (iOS Settings → 손쉬운 사용 → 음성 콘텐츠 → 음성에서 "유나 (향상됨)" 다운로드 권장)
  const priority = ['neural','premium','enhanced','natural','향상','고급','siri'];
  const known = /yuna|heami|sora|nara|jian|seoyeon|sumi|jiwon/i;
  const score = v => {
    const n = (v.name || '').toLowerCase();
    let s = 0;
    priority.forEach((kw,i)=>{ if(n.includes(kw)) s += (10-i)*100; });
    if(known.test(v.name||'')) s += 60;
    if(n.includes('compact') || n.includes('lite')) s -= 80;
    if(v.localService) s += 10;  // 로컬 보이스가 보통 응답이 빠름
    return s;
  };
  koreans.sort((a,b)=> score(b) - score(a));
  koVoice = koreans[0];
}
if('speechSynthesis' in window){
  pickVoice();
  speechSynthesis.onvoiceschanged = pickVoice;
}
const speakBtn = document.getElementById('speakBtn');
function speak(text){
  if(!soundOn || !('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  // 자연스러운 호흡: 마침표·쉼표 뒤에 짧은 공백을 추가해 한 호흡씩 끊어 읽도록 유도
  const natural = text
    .replace(/\.\s*/g, '.  ')
    .replace(/,\s*/g, ',  ')
    .replace(/!\s*/g, '!  ')
    .replace(/\?\s*/g, '?  ');
  const u = new SpeechSynthesisUtterance(natural);
  u.lang = 'ko-KR';
  if(koVoice) u.voice = koVoice;
  u.rate = 0.88;   // 살짝 더 천천히, 아이들이 듣기 좋게
  u.pitch = 1.0;   // 자연스러운 톤
  u.volume = 1.0;
  u.onstart = ()=> speakBtn.classList.add('speaking');
  u.onend = u.onerror = ()=> speakBtn.classList.remove('speaking');
  speechSynthesis.speak(u);
}
function stopSpeak(){
  if('speechSynthesis' in window) speechSynthesis.cancel();
  speakBtn.classList.remove('speaking');
}
speakBtn.onclick = ()=>{
  const pool = poolFor();
  if(selectedId && pool[selectedId]){
    const p = pool[selectedId].p;
    const expanded = !document.getElementById('cMore').hidden;
    if(expanded && p.details){
      const facts = (p.funFacts || []).join('. ');
      speak(`${p.name}. ${p.details} ${facts ? '재미있는 사실도 알려드릴게요. ' + facts : ''}`);
    } else {
      speak(`${p.name}. ${p.fact}`);
    }
  }
};

const quizEl = document.getElementById('quiz');
const quizQEl = document.getElementById('quizQ');
const quizOptsEl = document.getElementById('quizOpts');
const quizFbEl = document.getElementById('quizFb');
const quizNextEl = document.getElementById('quizNext');
const quizScoreEl = document.getElementById('quizScore');
let quizScore = 0, quizIdx = -1;
function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=(Math.random()*(i+1))|0; [a[i],a[j]]=[a[j],a[i]]; } return a; }
function nextQuiz(){
  let i; do{ i=(Math.random()*QUIZ.length)|0; } while(i===quizIdx && QUIZ.length>1);
  quizIdx = i; const item = QUIZ[i];
  quizQEl.textContent = item.q;
  quizFbEl.textContent = '';
  quizNextEl.hidden = true;
  quizOptsEl.innerHTML = '';
  shuffle(item.opts.slice()).forEach(o=>{
    const b = document.createElement('button');
    b.textContent = o;
    b.onclick = ()=> answerQuiz(b, o, item);
    quizOptsEl.appendChild(b);
  });
  speak(item.q);
}
function answerQuiz(btn, choice, item){
  [...quizOptsEl.children].forEach(b=>{ b.disabled = true; if(b.textContent===item.a) b.classList.add('correct'); });
  if(choice===item.a){
    quizScore++; quizScoreEl.textContent = '⭐ ' + quizScore;
    quizFbEl.textContent = '🎉 정답이에요! ' + item.why;
    speak('정답이에요! ' + item.why);
  } else {
    btn.classList.add('wrong');
    quizFbEl.textContent = '아쉬워요. 정답은 "' + item.a + '"이에요. ' + item.why;
    speak('아쉬워요. 정답은 ' + item.a + '. ' + item.why);
  }
  quizNextEl.hidden = false;
}
document.getElementById('quizBtn').onclick = ()=>{
  quizEl.hidden = false;
  quizScore = 0; quizScoreEl.textContent = '⭐ 0';
  nextQuiz();
};
document.getElementById('quizClose').onclick = ()=>{ quizEl.hidden = true; stopSpeak(); };

const nav = document.getElementById('nav');
function buildNav(){
  nav.innerHTML = '';
  const list = navListFor();
  list.forEach(p=>{
    const btn = document.createElement('button');
    btn.className = 'pill'; btn.dataset.id = p.id;
    const c = '#'+p.color.toString(16).padStart(6,'0');
    btn.innerHTML = `<span class="dot" style="background:${c};color:${c}"></span>${p.name}`;
    btn.onclick = ()=> select(p.id);
    nav.appendChild(btn);
  });
}
function highlightPill(id){
  nav.querySelectorAll('.pill').forEach(el=> el.classList.toggle('on', el.dataset.id===id));
  const on = nav.querySelector('.pill.on');
  if(on) on.scrollIntoView({behavior:'smooth', inline:'center', block:'nearest'});
}

const labelsEl = document.getElementById('labels');
const labelMap = {}; // id → element
function buildLabels(){
  labelsEl.innerHTML = '';
  for(const k in labelMap) delete labelMap[k];
  const list = labelListFor();
  list.forEach(p=>{
    const el = document.createElement('button');
    el.className = 'lbl'; el.textContent = p.name;
    el.onclick = e=>{ e.stopPropagation(); select(p.id); };
    labelsEl.appendChild(el);
    labelMap[p.id] = el;
  });
}
const _lv = new THREE.Vector3();
const _lastCam = new THREE.Vector3();
function updateLabels(){
  // 카메라가 움직이는 동안(드래그·확대·트윈)에는 라벨을 숨겨 캔버스와의 어긋남을 없앤다.
  const moved = camera.position.distanceTo(_lastCam);
  _lastCam.copy(camera.position);
  const moving = pointers.size>0 || moved>0.08;
  labelsEl.classList.toggle('moving', moving);
  if(moving) return;  // 이동 중엔 라벨이 숨겨지므로 위치 계산을 건너뛴다(성능)
  const pool = poolFor();
  const w = canvas.clientWidth || innerWidth;
  const h = canvas.clientHeight || innerHeight;
  for(const id in labelMap){
    const b = pool[id], el = labelMap[id];
    if(!b){ el.style.display='none'; continue; }
    b.mesh.getWorldPosition(_lv);
    _lv.project(camera);
    if(_lv.z > 1){ el.style.display='none'; continue; } // 카메라 뒤
    el.style.display = '';
    const x = (_lv.x*0.5+0.5)*w, y = (-_lv.y*0.5+0.5)*h;
    el.style.transform = `translate(${x}px,${y}px) translate(-50%,-150%)`;
    el.classList.toggle('dim', id===selectedId); // 선택된 건 카드에 이름이 있으니 숨김
  }
}
buildLabels();

// ── 애니메이션 루프 ──────────────────────────
const clock = new THREE.Clock();

// 카드가 오른쪽 사이드바로 떠 있을 때(아이패드+ 가로), 3D 장면을 살짝 왼쪽으로 옮겨
// 그려서 행성이 카드 뒤로 숨지 않게 한다. setViewOffset 으로 투영을 좌측으로 시프트.
const SIDE_CARD_OFFSET_PX = 400;  // 카드 폭(380) + 여유
function isSideCardMode(){
  return matchMedia('(min-width: 900px) and (orientation: landscape)').matches;
}
function updateCameraProjection(){
  const w = canvas.clientWidth || innerWidth;
  const h = canvas.clientHeight || innerHeight;
  if(isSideCardMode() && selectedId){
    const fullW = w + SIDE_CARD_OFFSET_PX;
    camera.aspect = fullW / h;
    camera.setViewOffset(fullW, h, SIDE_CARD_OFFSET_PX, 0, w, h);
  } else {
    camera.aspect = w / h;
    camera.clearViewOffset();
  }
  camera.updateProjectionMatrix();
}
function resize(){
  const w = canvas.clientWidth || innerWidth;
  const h = canvas.clientHeight || innerHeight;
  renderer.setSize(w, h, false);
  updateCameraProjection();
}
addEventListener('resize', resize);
if(window.visualViewport) window.visualViewport.addEventListener('resize', resize);
resize();

function tick(){
  requestAnimationFrame(tick);
  const dt = Math.min(clock.getDelta(), 0.05);
  const t = clock.elapsedTime;

  // 공전 / 자전 — 우주 학습 앱이라 동작 줄이기 설정과 무관하게 항상 움직임
  Object.values(bodies).forEach(b=>{
    const p = b.p;
    b.spin.rotation.y += dt*0.4;
    if(p.parent){                       // 위성: 모행성 주위를 공전
      b.angle += dt*(p.moonSpeed || 0.5);
      const pp = bodies[p.parent].mesh.position, o = p.orbit || 2;
      b.mesh.position.set(pp.x + Math.cos(b.angle)*o, pp.y, pp.z + Math.sin(b.angle)*o);
    } else if(p.dist>0){                 // 행성: 태양 주위를 공전
      b.angle += dt*p.speed*0.12;
      b.mesh.position.set(Math.cos(b.angle)*p.dist, 0, Math.sin(b.angle)*p.dist);
    }
  });
  Object.values(starBodies).forEach((b,i)=>{
    const glow = b.mesh.children[0];
    if(glow) glow.material.opacity = 0.75 + Math.sin(t*2 + i*1.7)*0.18;
  });
  if(asteroidBelt) asteroidBelt.rotation.y += dt*0.03;
  // 별자리는 항상 카메라를 정면으로 향하게 해 모양이 또렷이 보이도록 한다
  if(constGroup.visible) constGroup.children.forEach(g=> g.quaternion.copy(camera.quaternion));

  // 선택한 천체 따라가기 + 부드러운 트윈
  if(ctrl.followMesh){
    const wp = new THREE.Vector3(); ctrl.followMesh.getWorldPosition(wp);
    ctrl.tTarget.copy(wp);
  }
  ctrl.target.lerp(ctrl.tTarget, 1 - Math.pow(0.0015, dt));
  ctrl.radius += (ctrl.tRadius - ctrl.radius) * (1 - Math.pow(0.002, dt));

  applyCamera();
  updateLabels();
  renderer.render(scene, camera);
}
tick();

// 첫 화면: 살짝 기울어진 전경 + 환영 멘트(소리는 사용자 첫 터치 후에만 가능하므로 생략)
ctrl.tRadius = 70;
</script>
</body>
